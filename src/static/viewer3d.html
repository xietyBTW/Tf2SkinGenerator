<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>3D Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  #canvas-container { width: 100%; height: 100%; }

  /* ── Статус (idle / loading / error) ───────────────────────────────── */
  #status {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    pointer-events: none;
  }

  /* Spinner (только в режиме loading) */
  @keyframes spin { to { transform: rotate(360deg); } }

  #status-spinner {
    width: 26px;
    height: 26px;
    border: 2px solid #2c2c2c;
    border-top-color: #5a5a5a;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    display: none;
    flex-shrink: 0;
  }

  #status-icon {
    font-size: 32px;
    opacity: 0.18;
    line-height: 1;
  }

  #status-text {
    color: #454545;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.045em;
    text-align: center;
    max-width: 300px;
    line-height: 1.55;
  }

  /* loading */
  #status.loading #status-spinner { display: block; }
  #status.loading #status-icon    { display: none;  }
  #status.loading #status-text    { color: #505050; }

  /* error */
  #status.error #status-text { color: #c0392b; font-size: 12px; }
  #status.error #status-icon { opacity: 0.45; }

  /* ── Подсказка управления ─────────────────────────────────────────── */
  #hint {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    color: #333;
    font-size: 10.5px;
    letter-spacing: 0.05em;
    pointer-events: none;
    white-space: nowrap;
    user-select: none;
  }



  /* ── Drop-overlay (drag & drop текстуры) ─────────────────────────── */
  #drop-overlay {
    position: absolute;
    inset: 6px;
    border: 1.5px dashed #444;
    border-radius: 6px;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(0, 0, 0, 0.55);
    pointer-events: none;
    z-index: 20;
  }
  #drop-overlay.visible { display: flex; }

  #drop-icon {
    font-size: 28px;
    opacity: 0.5;
  }
  #drop-text {
    color: #666;
    font-size: 12px;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="status">
  <div id="status-spinner"></div>
  <div id="status-icon">⬛</div>
  <div id="status-text"></div>
</div>

<div id="hint" style="display:none;"></div>

<div id="drop-overlay">
  <div id="drop-icon">🖼</div>
  <div id="drop-text"></div>
</div>


<!-- Qt WebChannel bridge (Python ↔ JS) — поставляется Qt, не CDN -->
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>

<!-- Three.js from CDN -->
<script type="importmap">
{
  "imports": {
    "three":          "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE        from 'three';
import { OBJLoader }     from 'three/addons/loaders/OBJLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Python bridge (QWebChannel JS → Python) ──────────────────────────────── //
// Инициализируется асинхронно; вызовы _notifyTextureDrop() безопасны до готовности.
let _pyBridge = null;
(function _initBridge() {
  try {
    if (typeof QWebChannel !== 'undefined' && typeof qt !== 'undefined') {
      new QWebChannel(qt.webChannelTransport, channel => {
        _pyBridge = channel.objects.pyBridge;
      });
    }
  } catch (_) { /* standalone browser — bridge недоступен */ }
})();

function _notifyTextureDrop(dataUrl) {
  try { if (_pyBridge) _pyBridge.notifyTextureDrop(dataUrl); }
  catch (_) { /* ignore */ }
}

// ── i18n ─────────────────────────────────────────────────────────────────── //
const I18N = {
  ru: {
    select_weapon : 'Выберите оружие для 3D Preview',
    loading       : 'Загрузка...',
    error_model   : 'Ошибка загрузки модели',
    no_internet   : 'Нет подключения к интернету (Three.js CDN недоступен)',
    hint          : 'ЛКМ — вращение · Колесо — масштаб · ПКМ — панорама',
    drop_texture  : 'Отпустите, чтобы применить текстуру',
  },
  en: {
    select_weapon : 'Select a weapon for 3D Preview',
    loading       : 'Loading...',
    error_model   : 'Model load error',
    no_internet   : 'No internet connection (Three.js CDN unavailable)',
    hint          : 'LMB — rotate · Wheel — zoom · RMB — pan',
    drop_texture  : 'Release to apply texture',
  },
};

let _lang = 'en';
let _t    = I18N['en'];

window.setLanguage = function(lang) {
  _lang = (lang in I18N) ? lang : 'en';
  _t    = I18N[_lang];
  document.getElementById('hint').textContent     = _t.hint;
  document.getElementById('drop-text').textContent = _t.drop_texture;
  // Обновляем текст статуса только если показан начальный экран (не loading/error)
  if (!status.classList.contains('loading') && !status.classList.contains('error')) {
    if (!currentModel) {
      statusText.textContent = _t.select_weapon;
    }
  }
};

// ── Renderer ─────────────────────────────────────────────────────────────── //
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.setClearColor(0x1a1a1a);
document.getElementById('canvas-container').appendChild(renderer.domElement);

// ── Scene / Camera ───────────────────────────────────────────────────────── //
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(
  45, window.innerWidth / window.innerHeight, 0.001, 1000
);
camera.position.set(0, 0.5, 3);

// ── Controls ─────────────────────────────────────────────────────────────── //
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance   = 0.1;
controls.maxDistance   = 20;

// ── Lighting ─────────────────────────────────────────────────────────────── //
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const key  = new THREE.DirectionalLight(0xffffff, 1.2);
key.position.set(2, 4, 3);
scene.add(key);
const fill = new THREE.DirectionalLight(0xaaccff, 0.4);
fill.position.set(-3, 1, -2);
scene.add(fill);
const rim  = new THREE.DirectionalLight(0xffffff, 0.3);
rim.position.set(0, -2, -3);
scene.add(rim);

// ── State ────────────────────────────────────────────────────────────────── //
let currentModel  = null;
let _animTimer    = null;
let _animFrames   = [];
let _pendingAnim        = null;
let _pendingMaterialMap = null;  // {mat_name: dataUrl} — ожидает загрузки OBJ
// null  → обновляем все меши (обычный режим)
// Set   → обновляем только меши с именами из множества (режим рук)
let _editableMeshNames  = null;

let _critSprite   = null;   // THREE.Sprite — CritHIT billboard
let _isCritHitMode = false; // Режим CritHIT (персонаж + billboard)

// CritHIT billboard animation (GIF / animated VTF)
let _critAnimTimer  = null;   // setInterval для анимации billboard'а

// Generation counter: инкрементируется при каждом новом вызове load/reset.
// Все async-колбэки проверяют, что их gen === _sceneGeneration,
// прежде чем трогать сцену — это устраняет все race condition'ы.
let _sceneGeneration = 0;

const status      = document.getElementById('status');
const statusText  = document.getElementById('status-text');
const statusIcon  = document.getElementById('status-icon');
const hint        = document.getElementById('hint');
const dropOverlay = document.getElementById('drop-overlay');

// Инициализируем тексты
statusText.textContent          = _t.select_weapon;
hint.textContent                = _t.hint;
document.getElementById('drop-text').textContent = _t.drop_texture;

// ── Status helpers ───────────────────────────────────────────────────────── //
function setStatus(text, isError = false, isLoading = false) {
  status.style.display  = 'flex';
  status.className      = isError ? 'error' : (isLoading ? 'loading' : '');
  statusText.textContent = text;
  statusIcon.textContent = isError ? '⚠' : '⬛';
  hint.style.display    = 'none';
}

function hideStatus() {
  status.style.display = 'none';
  hint.style.display   = 'block';
}

// ── Texture animation ────────────────────────────────────────────────────── //
function stopAnimation() {
  if (_animTimer !== null) { clearInterval(_animTimer); _animTimer = null; }
  _animFrames         = [];
  _pendingAnim        = null;
  _pendingMaterialMap = null;
  if (_critAnimTimer !== null) { clearInterval(_critAnimTimer); _critAnimTimer = null; }
}

function startAnimation(textures, framerate) {
  stopAnimation();
  if (!textures || textures.length <= 1) return;
  _animFrames = textures;
  let frame   = 0;
  const ms    = Math.max(16, Math.round(1000 / Math.max(0.1, framerate)));
  _animTimer  = setInterval(() => {
    if (currentModel) applyTexture(currentModel, _animFrames[frame % _animFrames.length]);
    frame++;
  }, ms);
}

// ── Geometry helpers ─────────────────────────────────────────────────────── //
function applyTransform(object, cx, cy, cz, scale) {
  object.position.set(-cx * scale, -cy * scale, -cz * scale);
  object.scale.setScalar(scale);
  const fovRad   = (camera.fov * Math.PI) / 180;
  const distance = 1.0 / Math.tan(fovRad / 2) * 1.8;
  camera.position.set(0, 0.2, distance);
  camera.lookAt(0, 0, 0);
  controls.target.set(0, 0, 0);
  controls.update();
}

function applyTexture(object, tex) {
  object.traverse(child => {
    if (!child.isMesh) return;
    // Preserve the material name so applyMaterialMap can still match by name
    const prevMatName = child.material && !Array.isArray(child.material)
      ? child.material.name : '';
    child.material = tex
      ? new THREE.MeshLambertMaterial({ map: tex, side: THREE.DoubleSide })
      : new THREE.MeshLambertMaterial({ color: 0x888888, side: THREE.DoubleSide });
    if (prevMatName) child.material.name = prevMatName;
    child.material.needsUpdate = true;
  });
}

// ── Texture loader helper ─────────────────────────────────────────────────── //

// Загружает текстуру из dataUrl и вызывает onLoaded(texture).
// При ошибке логирует в консоль и НЕ вызывает onLoaded (модель остаётся
// с текущим материалом — лучше серая, чем белый экран).
function _loadTextureThen(dataUrl, onLoaded) {
  const tl = new THREE.TextureLoader();
  tl.load(
    dataUrl,
    tex => {
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      onLoaded(tex);
    },
    undefined,       // onProgress — не нужен
    err => {
      // Ошибка тихая в THREE.js — делаем её видимой для отладки
      const preview = dataUrl ? dataUrl.slice(0, 80) + '…' : '(empty)';
      console.warn('[3D viewer] Texture load failed:', err, 'dataUrl prefix:', preview);
    }
  );
}

// ── GIF animated texture support ─────────────────────────────────────────── //
//
// Подход: декодируем кадры GIF встроенным LZW-декодером (без CDN).
// Почему не <img> → canvas: Chrome/Qt WebEngine замораживает анимацию GIF
// для off-screen элементов, поэтому ctx.drawImage(img) всегда даёт первый кадр.
// Декодирование в JS даёт нам массив PNG data-URL → скармливаем в loadAnimatedTexture.

// Анимирует CritHIT billboard массивом уже загруженных Three.js текстур.
function _animateCritSprite(textures, fps) {
  if (_critAnimTimer !== null) { clearInterval(_critAnimTimer); _critAnimTimer = null; }
  if (!textures || textures.length <= 1) return;
  let frame = 1;   // кадр 0 уже применён снаружи
  const ms  = Math.max(16, Math.round(1000 / Math.max(0.1, fps)));
  _critAnimTimer = setInterval(() => {
    if (!_critSprite) { clearInterval(_critAnimTimer); _critAnimTimer = null; return; }
    _critSprite.material.map = textures[frame % textures.length];
    _critSprite.material.needsUpdate = true;
    frame++;
  }, ms);
}

// ── Inline GIF decoder (без внешних зависимостей) ────────────────────────── //
//
// GIF89a/GIF87a: LZW-декомпрессия, Global/Local Color Table, transparency,
// interlacing, disposal methods 0-3.
// Возвращает { dataUrls: string[], fps: number } или null при ошибке.

// LZW-декомпрессор для GIF.
function _gifLzwDecode(data, minCS, maxPx) {
  const cc = 1 << minCS;           // clear code
  const ec = cc + 1;               // end-of-info code
  let codeSize = minCS + 1;
  let mask     = (1 << codeSize) - 1;
  let next     = ec + 1;

  // Начальная таблица: каждый пиксельный индекс — массив из одного байта
  let tbl = [];
  for (let i = 0; i < cc; i++) tbl[i] = Uint8Array.of(i);

  const out    = new Uint8Array(maxPx);
  let outPos   = 0;
  let bitBuf   = 0, bitCnt = 0, dataPos = 0;

  function readCode() {
    while (bitCnt < codeSize && dataPos < data.length) {
      bitBuf |= data[dataPos++] << bitCnt;
      bitCnt += 8;
    }
    const c = bitBuf & mask;
    bitBuf >>>= codeSize;
    bitCnt  -= codeSize;
    return c;
  }

  let prev = null;
  while (outPos < maxPx) {
    const code = readCode();

    if (code === cc) {                              // CLEAR: сброс
      codeSize = minCS + 1;
      mask     = (1 << codeSize) - 1;
      next     = ec + 1;
      tbl      = [];
      for (let i = 0; i < cc; i++) tbl[i] = Uint8Array.of(i);
      prev = null;
      continue;
    }
    if (code === ec) break;                         // END

    let entry;
    if (code < next) {
      entry = tbl[code];
    } else if (code === next && prev !== null) {    // специальный случай LZW
      entry = new Uint8Array(prev.length + 1);
      entry.set(prev);
      entry[prev.length] = prev[0];
    } else { break; }                              // битый поток

    for (let i = 0; i < entry.length && outPos < maxPx; i++) out[outPos++] = entry[i];

    if (prev !== null && next < 4096) {
      const ne = new Uint8Array(prev.length + 1);
      ne.set(prev);
      ne[prev.length] = entry[0];
      tbl[next] = ne;
      next++;
      if (next === (1 << codeSize) && codeSize < 12) { codeSize++; mask = (1 << codeSize) - 1; }
    }
    prev = entry;
  }
  return out.subarray(0, outPos);
}

// Деинтерлейсинг GIF (4 прохода: строки 0,8,16…; 4,12…; 2,6…; 1,3,5…).
function _gifDeinterlace(rgba, w, h) {
  const out = new Uint8ClampedArray(rgba.length);
  let src = 0;
  for (const [start, step] of [[0,8],[4,8],[2,4],[1,2]]) {
    for (let r = start; r < h; r += step, src++) {
      out.set(rgba.subarray(src * w * 4, (src + 1) * w * 4), r * w * 4);
    }
  }
  return out;
}

// Основной парсер GIF. Sync, возвращает { dataUrls, fps } или null.
function _parseGif(buf) {
  const d = new Uint8Array(buf);
  let p = 6;  // пропускаем заголовок "GIF89a" / "GIF87a"

  // Logical Screen Descriptor
  const W  = d[p] | (d[p+1] << 8); p += 2;
  const H  = d[p] | (d[p+1] << 8); p += 2;
  const pk = d[p++];
  p += 2;  // background color index + pixel aspect ratio

  let gct = null;
  if (pk >> 7) { const n = 3 << ((pk & 7) + 1); gct = d.slice(p, p + n); p += n; }

  // Canvas для компоузинга кадров
  const cv = document.createElement('canvas');
  cv.width  = W;  cv.height = H;
  const cx  = cv.getContext('2d');

  const dataUrls = [], delays = [], frameDisposals = [];
  let disposal = 0, delay = 10, transpIdx = -1, savedData = null;

  function readSubBlocks() {
    const parts = [];
    let len;
    while ((len = d[p++]) !== 0) { parts.push(d.subarray(p, p + len)); p += len; }
    const total = parts.reduce((s, c) => s + c.length, 0);
    const flat  = new Uint8Array(total);
    let   off   = 0;
    for (const c of parts) { flat.set(c, off); off += c.length; }
    return flat;
  }
  function skipSubBlocks() { let l; while ((l = d[p++]) !== 0) p += l; }

  while (p < d.length) {
    const b = d[p++];
    if (b === 0x3B) break;   // Trailer

    if (b === 0x21) {        // Extension introducer
      const lbl = d[p++];
      if (lbl === 0xF9 && d[p] === 4) {        // Graphic Control Extension
        p++;                                    // block size = 4
        const gce = d[p++];
        disposal  = (gce >> 3) & 7;
        delay     = d[p] | (d[p+1] << 8); p += 2;
        const ti  = d[p++];
        transpIdx = (gce & 1) ? ti : -1;
        p++;                                    // block terminator
      } else { skipSubBlocks(); }

    } else if (b === 0x2C) { // Image Descriptor
      const left = d[p] | (d[p+1]<<8); p+=2;
      const top  = d[p] | (d[p+1]<<8); p+=2;
      const fw   = d[p] | (d[p+1]<<8); p+=2;
      const fh   = d[p] | (d[p+1]<<8); p+=2;
      const ipk  = d[p++];

      let ct = gct;
      if (ipk >> 7) { const n = 3 << ((ipk & 7) + 1); ct = d.slice(p, p + n); p += n; }

      const minCS = d[p++];
      const compressed = readSubBlocks();
      const pixels     = _gifLzwDecode(compressed, minCS, fw * fh);

      // Индексы → RGBA
      const rgba = new Uint8ClampedArray(fw * fh * 4);
      for (let i = 0; i < fw * fh; i++) {
        const ci = pixels[i];
        if (ci !== transpIdx && ct) {
          rgba[i*4]   = ct[ci*3];
          rgba[i*4+1] = ct[ci*3+1];
          rgba[i*4+2] = ct[ci*3+2];
          rgba[i*4+3] = 255;
        }
        // transpIdx → alpha=0 (уже 0 по умолчанию)
      }

      const patch = ((ipk >> 6) & 1) ? _gifDeinterlace(rgba, fw, fh) : rgba;

      // Disposal предыдущего кадра
      if (frameDisposals.length > 0) {
        const pd = frameDisposals[frameDisposals.length - 1];
        if (pd === 2) { cx.clearRect(0, 0, W, H); }
        else if (pd === 3 && savedData) { cx.putImageData(savedData, 0, 0); savedData = null; }
      }
      // Сохраняем для disposal=3 ЭТОГО кадра (нужно до его отрисовки)
      if (disposal === 3) savedData = cx.getImageData(0, 0, W, H);

      cx.putImageData(new ImageData(patch, fw, fh), left, top);
      dataUrls.push(cv.toDataURL('image/png'));
      delays.push((delay || 10) * 10);       // сентисекунды → мс
      frameDisposals.push(disposal);

      disposal = 0; delay = 10; transpIdx = -1;
    }
  }

  if (!dataUrls.length) return null;
  const avgDelay = delays.reduce((a, b) => a + b, 0) / delays.length;
  return { dataUrls, fps: 1000 / Math.max(avgDelay, 20) };
}

// Публичная точка входа (async для совместимости с drop-handler'ом).
async function _decodeGifFrames(arrayBuffer) {
  try { return _parseGif(arrayBuffer); }
  catch (e) { console.warn('[3D] GIF decode error:', e); return null; }
}

// Загружает декодированные кадры GIF как текстуры и анимирует CritHIT billboard.
function _animateCritHitGif(dataUrls, fps) {
  if (_critAnimTimer !== null) { clearInterval(_critAnimTimer); _critAnimTimer = null; }
  if (!dataUrls || !dataUrls.length) return;

  // Создаём спрайт если его ещё нет
  if (!_critSprite) {
    const mat    = new THREE.SpriteMaterial({ transparent: true, depthTest: false });
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(0.55, 0.55, 1);
    sprite.position.set(0, 1.38, 0);   // headTopWorld(1.0) + 0.38
    scene.add(sprite);
    _critSprite = sprite;
  }

  const sprite   = _critSprite;
  const textures = new Array(dataUrls.length).fill(null);
  let   loaded   = 0;

  dataUrls.forEach((url, i) => {
    _loadTextureThen(url, tex => {
      textures[i] = tex;
      loaded++;
      if (loaded === 1 && _critSprite === sprite) {
        sprite.material.map = tex;
        sprite.material.needsUpdate = true;
      }
      if (loaded === dataUrls.length && _critSprite === sprite) {
        _animateCritSprite(textures, fps);
      }
    });
  });
}

// ── Public API ───────────────────────────────────────────────────────────── //

window.loadModelFromContent = function(objContent, texDataUrl, cx, cy, cz, scale) {
  const gen = ++_sceneGeneration;   // все предыдущие async-колбэки теперь устарели
  _isCritHitMode    = false;
  _editableMeshNames = null;   // сбрасываем при каждой новой модели
  setStatus(_t.loading, false, true);
  stopAnimation();
  if (currentModel) { scene.remove(currentModel); currentModel = null; }
  if (_critSprite)  { scene.remove(_critSprite);  _critSprite  = null; }

  const blob   = new Blob([objContent], { type: 'text/plain' });
  const objUrl = URL.createObjectURL(blob);

  new OBJLoader().load(
    objUrl,
    object => {
      URL.revokeObjectURL(objUrl);
      if (_sceneGeneration !== gen) return;   // запрос устарел — более новый уже в очереди
      scene.add(object);
      currentModel = object;

      // Сначала показываем модель без текстуры (нейтральный цвет)
      applyTexture(object, null);
      applyTransform(object, cx, cy, cz, scale);
      hideStatus();

      // Диагностика: логируем все меши и имена материалов
      let _meshLog = '[OBJ meshes] total children=' + object.children.length + ' | ';
      object.traverse(child => {
        if (child.isMesh) {
          const mn = child.material ? (Array.isArray(child.material)
            ? child.material.map(m => m.name).join(',')
            : child.material.name) : 'null';
          _meshLog += 'mesh="' + child.name + '" mat="' + mn + '" | ';
        }
      });
      console.log(_meshLog);

      // Грузим текстуру ПОСЛЕ того как OBJ уже в сцене — исключает race condition
      if (texDataUrl && texDataUrl.length > 0) {
        _loadTextureThen(texDataUrl, tex => {
          // Применяем только если модель не сменилась за время загрузки
          if (currentModel === object) applyTexture(object, tex);
        });
      }

      if (_pendingAnim) {
        const { frameDataUrls, framerate } = _pendingAnim;
        _pendingAnim = null;
        window.loadAnimatedTexture(frameDataUrls, framerate);
      }

      if (_pendingMaterialMap) {
        const map = _pendingMaterialMap;
        _pendingMaterialMap = null;
        window.applyMaterialMap(map);
      }
    },
    undefined,
    err => {
      URL.revokeObjectURL(objUrl);
      console.error('OBJ load error:', err);
      setStatus(_t.error_model, true);
    }
  );
};

// Задаёт список имён мешей, которые получают текстуру при обновлении.
// names: массив строк (совпадают с 'g'-именами в OBJ) или null — обновлять все.
window.setEditableMeshNames = function(names) {
  _editableMeshNames = names ? new Set(names) : null;
};

window.updateTextureFromDataUrl = function(texDataUrl) {
  stopAnimation();
  if (!currentModel) return;
  const target = currentModel;
  _loadTextureThen(texDataUrl, tex => {
    if (currentModel !== target) return;
    if (_editableMeshNames) {
      // Режим рук: обновляем только редактируемые меши, остальные не трогаем
      target.traverse(child => {
        if (!child.isMesh || !_editableMeshNames.has(child.name)) return;
        const prevName = child.material && !Array.isArray(child.material)
          ? child.material.name : '';
        child.material = new THREE.MeshLambertMaterial({ map: tex, side: THREE.DoubleSide });
        if (prevName) child.material.name = prevName;
        child.material.needsUpdate = true;
      });
    } else {
      applyTexture(target, tex);
    }
  });
};

// Применяет отдельные текстуры к каждому материалу по имени.
// texMapJson: {mat_name: dataUrl, ...}
// Имена должны совпадать с usemtl в OBJ (child.material.name).
window.applyMaterialMap = function(texMapJson) {
  if (!currentModel) {
    // Модель ещё не загрузилась — сохраняем до момента готовности
    _pendingMaterialMap = texMapJson;
    return;
  }
  const target = currentModel;
  Object.entries(texMapJson).forEach(([matName, dataUrl]) => {
    if (!dataUrl) return;
    _loadTextureThen(dataUrl, tex => {
      if (currentModel !== target) return;
      target.traverse(child => {
        if (!child.isMesh) return;
        // Match by mesh name (from OBJ 'g' group) or by material name
        const matNameMatch = child.material && !Array.isArray(child.material)
          ? child.material.name === matName : false;
        if (child.name === matName || matNameMatch) {
          child.material = new THREE.MeshLambertMaterial({ map: tex, side: THREE.DoubleSide });
          child.material.name = matName;
          child.material.needsUpdate = true;
        }
      });
    });
  });
};

window.loadAnimatedTexture = function(frameDataUrls, framerate) {
  stopAnimation();
  if (!frameDataUrls || frameDataUrls.length === 0) return;
  if (frameDataUrls.length === 1) {
    window.updateTextureFromDataUrl(frameDataUrls[0]);
    return;
  }
  if (!currentModel) {
    _pendingAnim = { frameDataUrls, framerate };
    return;
  }
  const target   = currentModel;
  let   loaded   = 0;
  const textures = new Array(frameDataUrls.length).fill(null);

  frameDataUrls.forEach((url, i) => {
    _loadTextureThen(url, tex => {
      textures[i] = tex;
      loaded++;
      // Первый загруженный кадр — сразу показываем
      if (loaded === 1 && currentModel === target) applyTexture(target, tex);
      // Все кадры готовы — запускаем анимацию
      if (loaded === frameDataUrls.length && currentModel === target) {
        startAnimation(textures, framerate);
      }
    });
  });
};

window.showLoading = function(text) {
  setStatus(text || _t.loading, false, true);
};

window.showPrompt = function(text) {
  setStatus(text || _t.select_weapon, false, false);
};

window.showError = function(text) {
  setStatus(text, true);
};

window.resetViewer = function() {
  ++_sceneGeneration;
  _isCritHitMode    = false;
  _editableMeshNames = null;
  stopAnimation();
  if (currentModel) { scene.remove(currentModel); currentModel = null; }
  if (_critSprite)  { scene.remove(_critSprite);  _critSprite  = null; }
  setStatus(_t.select_weapon);
};

// ── CritHIT scene ────────────────────────────────────────────────────────── //

// Собирает модель Солдата из BoxGeometry-примитивов.
// Все размеры в условных единицах; солдат занимает высоту ~88 единиц (y 0..88).
function _buildSoldierGroup() {
  const group = new THREE.Group();

  const matBody   = new THREE.MeshLambertMaterial({ color: 0x575750 }); // хаки
  const matDark   = new THREE.MeshLambertMaterial({ color: 0x3a3830 }); // тёмный (ботинки/шлем)
  const matHelmet = new THREE.MeshLambertMaterial({ color: 0x2e3028 }); // шлем

  // [ширина, высота, глубина, центр_x, центр_y, центр_z, материал]
  const parts = [
    // Ботинки
    [8, 10, 14, -5,    5,  0,  matDark],
    [8, 10, 14,  5,    5,  0,  matDark],
    // Ноги
    [7, 28, 10, -5,   24,  0,  matBody],
    [7, 28, 10,  5,   24,  0,  matBody],
    // Торс
    [24, 24, 14,  0,  51,  1,  matBody],
    // Плечи
    [ 8,  8, 11,-14,  63,  0,  matBody],
    [ 8,  8, 11, 14,  63,  0,  matBody],
    // Руки
    [ 6, 28,  8,-15,  50,  0,  matBody],
    [ 6, 28,  8, 15,  50,  0,  matBody],
    // Шея
    [ 6,  5,  6,  0,  68,  0,  matBody],
    // Голова
    [14, 12, 14,  0,  75,  0,  matBody],
    // Шлем (поля + тулья)
    [20,  4, 20,  0,  82,  1,  matHelmet],
    [16,  8, 16,  0,  86,  0,  matHelmet],
  ];

  parts.forEach(([w, h, d, x, y, z, mat]) => {
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    mesh.position.set(x, y, z);
    group.add(mesh);
  });

  return group;
}

// Создаёт/пересоздаёт спрайт текстуры крита над головой.
function _placeCritSprite(dataUrl, headTopWorldY) {
  if (_critSprite) { scene.remove(_critSprite); _critSprite = null; }
  if (!dataUrl) return;

  // Создаём спрайт сразу (без текстуры), чтобы позиция была заранее задана
  const mat    = new THREE.SpriteMaterial({ transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(0.55, 0.55, 1);
  sprite.position.set(0, headTopWorldY + 0.38, 0);
  scene.add(sprite);
  _critSprite = sprite;

  // Загружаем текстуру через хелпер с error callback
  // Масштаб всегда 1:1 — crit.vtf в игре 256×256 (квадратная)
  _loadTextureThen(dataUrl, tex => {
    if (_critSprite !== sprite) return;   // спрайт уже заменён
    mat.map = tex;
    mat.needsUpdate = true;
  });
}

// Применяет текстуру ко всем мешам группы (солдат или OBJ).
// Загружает через _loadTextureThen — безопасный error callback и правильный colorSpace.
function _applyModelTexture(group, modelTexDataUrl) {
  if (!modelTexDataUrl) return;
  _loadTextureThen(modelTexDataUrl, tex => {
    group.traverse(child => {
      if (!child.isMesh) return;
      child.material = new THREE.MeshLambertMaterial({ map: tex, side: THREE.DoubleSide });
      child.material.needsUpdate = true;
    });
  });
}

// Публичная функция: загружает сцену CritHIT (солдат + billboard текстуры).
// modelTexDataUrl — data URL текстуры самого персонажа (необязательно).
window.loadCritHitScene = function(critTexDataUrl, modelTexDataUrl) {
  ++_sceneGeneration;   // отменяет любой параллельный loadCritHitSceneWithModel
  _isCritHitMode = true;
  setStatus(_t.loading, false, true);
  stopAnimation();

  // Очищаем предыдущую сцену
  if (currentModel) { scene.remove(currentModel); currentModel = null; }
  if (_critSprite)  { scene.remove(_critSprite);  _critSprite  = null; }

  // Строим солдата
  const soldier  = _buildSoldierGroup();
  // Солдат: y=0..88 → центр cy=44, высота=88
  const solHeight = 88;
  const cy        = solHeight / 2;
  const scale     = 2.0 / solHeight;

  soldier.position.set(0, -cy * scale, 0);
  soldier.scale.setScalar(scale);
  scene.add(soldier);
  currentModel = soldier;

  // Накладываем текстуру персонажа (если есть)
  if (modelTexDataUrl) {
    _applyModelTexture(soldier, modelTexDataUrl);
  }

  // Камера: немного выше центра, достаточно далеко чтобы видеть и фигуру, и эффект
  const fovRad   = (camera.fov * Math.PI) / 180;
  const distance = 1.0 / Math.tan(fovRad / 2) * 2.5;
  camera.position.set(0, 0.4, distance);
  camera.lookAt(0, 0.35, 0);
  controls.target.set(0, 0.35, 0);
  controls.update();

  // Billboard над головой: макушка в мировых координатах = (solHeight - cy)*scale = 1.0
  const headTopWorld = (solHeight - cy) * scale; // ≈ 1.0
  _placeCritSprite(critTexDataUrl, headTopWorld);

  hideStatus();
};

// Публичная функция: CritHIT сцена с пользовательской OBJ-моделью.
// Принимает содержимое OBJ-файла + параметры центрирования (вычисленные в Python).
// modelTexDataUrl — data URL текстуры самого персонажа (необязательно).
window.loadCritHitSceneWithModel = function(objContent, critTexDataUrl, cx, cy, cz, scale, modelTexDataUrl) {
  const gen = ++_sceneGeneration;   // все предыдущие async-колбэки теперь устарели
  _isCritHitMode = true;
  setStatus(_t.loading, false, true);
  stopAnimation();

  if (currentModel) { scene.remove(currentModel); currentModel = null; }
  if (_critSprite)  { scene.remove(_critSprite);  _critSprite  = null; }

  const blob   = new Blob([objContent], { type: 'text/plain' });
  const objUrl = URL.createObjectURL(blob);

  new OBJLoader().load(
    objUrl,
    object => {
      URL.revokeObjectURL(objUrl);

      // Запрос устарел (пользователь переключился на другой режим)
      if (_sceneGeneration !== gen) return;

      // Накладываем текстуру персонажа если есть, иначе нейтральный силуэт
      if (modelTexDataUrl) {
        _applyModelTexture(object, modelTexDataUrl);
      } else {
        object.traverse(child => {
          if (!child.isMesh) return;
          child.material = new THREE.MeshLambertMaterial({ color: 0x575750, side: THREE.DoubleSide });
          child.material.needsUpdate = true;
        });
      }

      scene.add(object);
      currentModel = object;

      // Позиционируем и масштабируем так же как обычную модель
      object.position.set(-cx * scale, -cy * scale, -cz * scale);
      object.scale.setScalar(scale);

      // Камера (аналогично процедурному солдату)
      const fovRad   = (camera.fov * Math.PI) / 180;
      const distance = 1.0 / Math.tan(fovRad / 2) * 2.5;
      camera.position.set(0, 0.4, distance);
      camera.lookAt(0, 0.35, 0);
      controls.target.set(0, 0.35, 0);
      controls.update();

      // Billboard: после нормализации top ≈ 1.0 (модель в диапазоне [-1, 1])
      _placeCritSprite(critTexDataUrl, 1.0);

      hideStatus();
        },
    undefined,
    err => {
      URL.revokeObjectURL(objUrl);
      console.error('Custom model OBJ load error:', err);
      // Fallback: строим процедурного солдата (только если запрос ещё актуален)
      if (_sceneGeneration === gen) {
        window.loadCritHitScene(critTexDataUrl, modelTexDataUrl);
      }
    }
  );
};


// Публичная функция: обновляет только текстуру CritHIT billboard.
window.updateCritHitTexture = function(critTexDataUrl) {
  if (!_isCritHitMode) return;
  const solHeight    = 88;
  const headTopWorld = (solHeight - solHeight / 2) * (2.0 / solHeight); // 1.0
  _placeCritSprite(critTexDataUrl, headTopWorld);
};

// ── Drag & Drop (текстура прямо в 3D) ────────────────────────────────────── //
const IMAGE_EXTS = /\.(png|jpg|jpeg|bmp|gif|webp|tga)$/i;
let   _dragDepth = 0;

document.addEventListener('dragenter', e => {
  const items = e.dataTransfer?.items;
  if (!items) return;
  // Проверяем что тащат файл-изображение
  const hasImage = Array.from(items).some(
    item => item.kind === 'file' && (item.type.startsWith('image/') || IMAGE_EXTS.test(item.name || ''))
  );
  if (!hasImage) return;
  e.preventDefault();
  _dragDepth++;
  if (_dragDepth === 1) dropOverlay.classList.add('visible');
});

document.addEventListener('dragleave', () => {
  _dragDepth = Math.max(0, _dragDepth - 1);
  if (_dragDepth === 0) dropOverlay.classList.remove('visible');
});

document.addEventListener('dragover', e => {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
});

document.addEventListener('drop', e => {
  e.preventDefault();
  _dragDepth = 0;
  dropOverlay.classList.remove('visible');

  const file = e.dataTransfer?.files?.[0];
  if (!file) return;
  const isImage = file.type.startsWith('image/') || IMAGE_EXTS.test(file.name);
  if (!isImage) return;

  const isGif = file.type === 'image/gif' || /\.gif$/i.test(file.name);

  if (isGif) {
    // GIF: читаем как ArrayBuffer → декодируем кадры встроенным декодером
    const bufReader = new FileReader();
    bufReader.onload = async evt => {
      const gifBuffer = evt.target.result;
      stopAnimation();

      const decoded = await _decodeGifFrames(gifBuffer);

      if (decoded && decoded.dataUrls.length > 0) {
        if (_isCritHitMode) {
          _animateCritHitGif(decoded.dataUrls, decoded.fps);
        } else if (currentModel) {
          window.loadAnimatedTexture(decoded.dataUrls, decoded.fps);
        }
      } else {
        // Fallback: показываем первый кадр как статичную текстуру
        const urlReader = new FileReader();
        urlReader.onload = e2 => {
          if (_isCritHitMode)  window.updateCritHitTexture(e2.target.result);
          else if (currentModel) window.updateTextureFromDataUrl(e2.target.result);
        };
        urlReader.readAsDataURL(file);
      }

      // Уведомляем Python с оригинальным GIF (data URL) — 2D превью покажет анимацию
      const gifReader = new FileReader();
      gifReader.onload = e => _notifyTextureDrop(e.target.result);
      gifReader.readAsDataURL(new Blob([gifBuffer], { type: 'image/gif' }));
    };
    bufReader.readAsArrayBuffer(file);
  } else {
    // Статичное изображение — прежнее поведение
    const reader = new FileReader();
    reader.onload = evt => {
      const dataUrl = evt.target.result;
      stopAnimation();
      if (_isCritHitMode) {
        window.updateCritHitTexture(dataUrl);
      } else if (currentModel) {
        window.updateTextureFromDataUrl(dataUrl);
      } else {
        _pendingAnim = { frameDataUrls: [dataUrl], framerate: 0 };
      }
      // Уведомляем Python: обновить 2D превью
      _notifyTextureDrop(dataUrl);
    };
    reader.readAsDataURL(file);
  }
});

// ── Render loop ──────────────────────────────────────────────────────────── //
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ── Resize ───────────────────────────────────────────────────────────────── //
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── CDN error fallback ───────────────────────────────────────────────────── //
window.addEventListener('error', e => {
  if (e.filename && e.filename.includes('cdn.jsdelivr.net')) {
    setStatus(_t.no_internet, true);
  }
});
</script>
