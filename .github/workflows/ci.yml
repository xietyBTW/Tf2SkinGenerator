name: ci
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      # Лайнт-гейт (pyflakes-набор F): ловит неопределённые имена, неиспользуемые
      # импорты, переопределения и мёртвые локальные. Стоит до тестов — быстрый
      # fail-fast на ошибках кода. Конфиг в ruff.toml.
      - name: Lint (ruff)
        run: python -m ruff check src main.py
      - name: Run tests with coverage
        run: coverage run -m unittest discover -s tests
      - name: Generate coverage report
        run: coverage json -o coverage.json
      - name: Enforce coverage thresholds
        run: python scripts/check_coverage.py coverage.json 40 28
      # Гейт мёртвого кода. На min-confidence 80 vulture ловит недостижимый код и
      # неиспользуемые импорты практически без ложных срабатываний (Qt-колбэки и
      # enum-форматы VTF идут на 60% и сюда не попадают). main.py включён, чтобы
      # точки входа (create_app, setup_logging, ensure_exists) не считались мёртвыми.
      # Для более глубокого аудита (мёртвые методы/функции) запустите локально:
      #     python -m vulture src main.py --min-confidence 60
      - name: Dead-code check (vulture)
        run: python -m vulture src main.py --min-confidence 80
