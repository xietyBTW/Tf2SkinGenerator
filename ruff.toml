# Конфигурация ruff — лёгкий лайнт-гейт.
#
# Включён только набор F (pyflakes): он ловит высокоценные классы багов с
# нулём ложных срабатываний на текущем коде:
#   F821 — использование неимпортированного/неопределённого имени
#          (ровно тот баг, когда custom_vpk_service звал subprocess без import),
#   F401 — неиспользуемые импорты,
#   F811 — переопределение функции/импорта,
#   F841 — присвоенная, но неиспользуемая локальная переменная,
#   F-strings без подстановок и т.п.
#
# Стилевые правила (E/W/I/...) сознательно НЕ включены, чтобы гейт оставался
# зелёным и осмысленным. Расширять набор — отдельной задачей, после чистки.

target-version = "py312"

[lint]
select = ["F"]
